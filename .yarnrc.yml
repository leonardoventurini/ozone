nodeLinker: node-modules

# Delay newly published package versions so compromised releases have time to
# be flagged before routine installs can pick them up.
npmMinimalAgeGate: 3d

# Keep this empty by default. Add exact descriptors or package globs only when
# a reviewed security remediation must consume a release younger than the gate.
npmPreapprovedPackages:
  # Merge exception for origin/main, published 2026-07-07T21:16Z. Remove after
  # the release ages past the three-day gate.
  - "@atproto/syntax@0.7.1"
