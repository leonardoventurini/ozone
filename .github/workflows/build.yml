name: Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  building:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Install node 26.4.0
        uses: actions/setup-node@v4
        with:
          node-version: 26.4.0

      - name: Enable Corepack
        run: corepack enable

      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Yarn install
        run: yarn

      - name: Typescript Check
        run: yarn type-check

      - name: Build
        run: yarn build
